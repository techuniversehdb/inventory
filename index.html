<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tech Universe Inventory</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📱 Tech Universe</h1>

<p>Available Mobile Phones</p>

</header>

<section class="search-box">

<input
type="text"
id="search"
placeholder="Search Mobile...">

</section>

<section class="brand-filter" id="brandFilter">

<!-- Brand buttons are generated automatically from the product list -->

</section>

<section class="sort-box">

<select id="sortSelect">
<option value="default">Sort By</option>
<option value="low">Price: Low to High</option>
<option value="high">Price: High to Low</option>
<option value="az">Name: A to Z</option>
<option value="za">Name: Z to A</option>
</select>

</section>

<section id="products" class="products">

<!-- Products will come from Google Sheet -->

</section>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
